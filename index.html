
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1c1008">
<title>Strongs Bible</title>
<link rel="manifest" href="manifest.json">
</head>
<body style="margin:0;padding:0;background:#1c1008">
<div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;



// ── SAMPLE DATA (Genesis 1, John 3, Romans 8) ──────────────────────────────
const VERSES_DATA = {};

// STRONGS_DATA loaded from GitHub repo (full 14,298 entries)
// Populated in useEffect on mount
let STRONGS_DATA = {};

// ── BOOKS ──────────────────────────────────────────────────────────────────
const BOOKS = [
  {id:"GEN",n:"Genesis",t:"OT",ch:50},{id:"EXO",n:"Exodus",t:"OT",ch:40},{id:"LEV",n:"Leviticus",t:"OT",ch:27},
  {id:"NUM",n:"Numbers",t:"OT",ch:36},{id:"DEU",n:"Deuteronomy",t:"OT",ch:34},{id:"JOS",n:"Joshua",t:"OT",ch:24},
  {id:"JDG",n:"Judges",t:"OT",ch:21},{id:"RUT",n:"Ruth",t:"OT",ch:4},{id:"1SA",n:"1 Samuel",t:"OT",ch:31},
  {id:"2SA",n:"2 Samuel",t:"OT",ch:24},{id:"1KI",n:"1 Kings",t:"OT",ch:22},{id:"2KI",n:"2 Kings",t:"OT",ch:25},
  {id:"1CH",n:"1 Chronicles",t:"OT",ch:29},{id:"2CH",n:"2 Chronicles",t:"OT",ch:36},{id:"EZR",n:"Ezra",t:"OT",ch:10},
  {id:"NEH",n:"Nehemiah",t:"OT",ch:13},{id:"EST",n:"Esther",t:"OT",ch:10},{id:"JOB",n:"Job",t:"OT",ch:42},
  {id:"PSA",n:"Psalms",t:"OT",ch:150},{id:"PRO",n:"Proverbs",t:"OT",ch:31},{id:"ECC",n:"Ecclesiastes",t:"OT",ch:12},
  {id:"SNG",n:"Song of Solomon",t:"OT",ch:8},{id:"ISA",n:"Isaiah",t:"OT",ch:66},{id:"JER",n:"Jeremiah",t:"OT",ch:52},
  {id:"LAM",n:"Lamentations",t:"OT",ch:5},{id:"EZK",n:"Ezekiel",t:"OT",ch:48},{id:"DAN",n:"Daniel",t:"OT",ch:12},
  {id:"HOS",n:"Hosea",t:"OT",ch:14},{id:"JOL",n:"Joel",t:"OT",ch:3},{id:"AMO",n:"Amos",t:"OT",ch:9},
  {id:"OBA",n:"Obadiah",t:"OT",ch:1},{id:"JON",n:"Jonah",t:"OT",ch:4},{id:"MIC",n:"Micah",t:"OT",ch:7},
  {id:"NAH",n:"Nahum",t:"OT",ch:3},{id:"HAB",n:"Habakkuk",t:"OT",ch:3},{id:"ZEP",n:"Zephaniah",t:"OT",ch:3},
  {id:"HAG",n:"Haggai",t:"OT",ch:2},{id:"ZEC",n:"Zechariah",t:"OT",ch:14},{id:"MAL",n:"Malachi",t:"OT",ch:4},
  {id:"MAT",n:"Matthew",t:"NT",ch:28},{id:"MRK",n:"Mark",t:"NT",ch:16},{id:"LUK",n:"Luke",t:"NT",ch:24},
  {id:"JHN",n:"John",t:"NT",ch:21},{id:"ACT",n:"Acts",t:"NT",ch:28},{id:"ROM",n:"Romans",t:"NT",ch:16},
  {id:"1CO",n:"1 Corinthians",t:"NT",ch:16},{id:"2CO",n:"2 Corinthians",t:"NT",ch:13},{id:"GAL",n:"Galatians",t:"NT",ch:6},
  {id:"EPH",n:"Ephesians",t:"NT",ch:6},{id:"PHP",n:"Philippians",t:"NT",ch:4},{id:"COL",n:"Colossians",t:"NT",ch:4},
  {id:"1TH",n:"1 Thessalonians",t:"NT",ch:5},{id:"2TH",n:"2 Thessalonians",t:"NT",ch:3},{id:"1TI",n:"1 Timothy",t:"NT",ch:6},
  {id:"2TI",n:"2 Timothy",t:"NT",ch:4},{id:"TIT",n:"Titus",t:"NT",ch:3},{id:"PHM",n:"Philemon",t:"NT",ch:1},
  {id:"HEB",n:"Hebrews",t:"NT",ch:13},{id:"JAS",n:"James",t:"NT",ch:5},{id:"1PE",n:"1 Peter",t:"NT",ch:5},
  {id:"2PE",n:"2 Peter",t:"NT",ch:3},{id:"1JN",n:"1 John",t:"NT",ch:5},{id:"2JN",n:"2 John",t:"NT",ch:1},
  {id:"3JN",n:"3 John",t:"NT",ch:1},{id:"JUD",n:"Jude",t:"NT",ch:1},{id:"REV",n:"Revelation",t:"NT",ch:22}
];

const C = {
  parch:"#f5ead6", parch2:"#ede0c4", parch3:"#e4d4b0",
  ink:"#2a1f0e", ink2:"#4a3820", ink3:"#7a6040", ink4:"#a89070",
  crimson:"#8b1a1a", gold:"#d4aa50", teal:"#1a5c5c",
  heb:"#9b4400", grk:"#1a4a7a"
};

// ── TOGGLE COMPONENT ────────────────────────────────────────────────────────
function Toggle({ checked, onChange, color }) {
  return (
    <label style={{ position:"relative", width:36, height:20, flexShrink:0, cursor:"pointer", display:"inline-block" }}>
      <input type="checkbox" checked={checked} onChange={onChange}
        style={{ opacity:0, width:0, height:0, position:"absolute" }} />
      <span style={{
        position:"absolute", inset:0, background: checked ? color : C.parch3,
        borderRadius:20, transition:"0.2s", border:`1.5px solid ${checked ? color : C.parch3}`
      }}>
        <span style={{
          position:"absolute", width:14, height:14, left:2, top:1,
          background: checked ? "#fff" : C.ink3, borderRadius:"50%",
          transition:"0.2s", transform: checked ? "translateX(16px)" : "none"
        }} />
      </span>
    </label>
  );
}

// ── MAIN APP ────────────────────────────────────────────────────────────────
function StrongsBible() {
  const [tab, setTab]           = useState("read");
  const [strongsLoaded, setStrongsLoaded] = useState(false);
  const [strongsError, setStrongsError]   = useState(false);

  // Load full Strong's dictionary from GitHub on mount
  useEffect(() => {
    const BASE = "https://raw.githubusercontent.com/supersonicandchill/Strongs/main/data";
    Promise.all([
      fetch(`${BASE}/strongs_h.json`).then(r => r.json()),
      fetch(`${BASE}/strongs_g.json`).then(r => r.json()),
    ]).then(([h, g]) => {
      Object.assign(STRONGS_DATA, h, g);
      setStrongsLoaded(true);
    }).catch(() => {
      // Fallback: try the combined file
      fetch(`${BASE}/strongs.json`)
        .then(r => r.json())
        .then(d => { Object.assign(STRONGS_DATA, d); setStrongsLoaded(true); })
        .catch(() => setStrongsError(true));
    });
  }, []);
  const [panel, setPanel]       = useState(null);
  const [cBook, setCBook]       = useState(null);
  const [cCh, setCCh]           = useState(null);
  const [verses, setVerses]     = useState(null);
  const [drawer, setDrawer]     = useState(null);
  const [noteEd, setNoteEd]     = useState(null);
  const [noteText, setNoteText] = useState("");
  const [notes, setNotes]       = useState({});
  const [showH, setShowH]       = useState(true);
  const [showG, setShowG]       = useState(true);
  const [showNums, setShowNums] = useState(false);
  const [fz, setFz]             = useState(19);
  const [bookQ, setBookQ]       = useState("");
  const [searchQ, setSearchQ]   = useState("");
  const [hits, setHits]         = useState([]);

  // Save notes
  const saveNotes = (n) => { setNotes(n); localStorage.setItem("sb_notes2", JSON.stringify(n)); };
  useEffect(() => {
    try { setNotes(JSON.parse(localStorage.getItem("sb_notes2") || "{}")); } catch {}
  }, []);

  // Load chapter - fetches from GitHub if not cached
  const loadCh = useCallback(async (bid, ch) => {
    const bk = BOOKS.find(b => b.id === bid);
    setCBook(bk); setCCh(ch); setPanel(null); setTab("read");
    setVerses("loading");
    if (!VERSES_DATA[bid]) {
      try {
        const r = await fetch("https://raw.githubusercontent.com/supersonicandchill/Strongs/main/data/verses/" + bid + ".json");
        if (r.ok) VERSES_DATA[bid] = await r.json();
      } catch(e) {}
    }
    const d = VERSES_DATA[bid]?.[String(ch)] || null;
    setVerses(d ? { bid, ch, data: d } : null);
  }, []);

  // Search
  useEffect(() => {
    if (searchQ.length < 2) { setHits([]); return; }
    const ql = searchQ.toLowerCase(), results = [];
    Object.entries(VERSES_DATA).forEach(([bid, chs]) => {
      const bk = BOOKS.find(b => b.id === bid);
      Object.entries(chs).forEach(([ch, vv]) => {
        Object.entries(vv).forEach(([v, toks]) => {
          const txt = toks.map(t => t.w || "").join(" ");
          if (txt.toLowerCase().includes(ql)) results.push({ bid, ch:+ch, v:+v, bk, txt });
        });
      });
    });
    setHits(results.slice(0, 40));
  }, [searchQ]);

  const noteKey = (bid, ch, v) => `${bid}|${ch}|${v}`;
  const hasNote = (bid, ch, v) => !!notes[noteKey(bid, ch, v)];

  const openNote = (bid, ch, v) => {
    const toks = VERSES_DATA[bid]?.[String(ch)]?.[String(v)] || [];
    const quote = toks.map(t => t.w || "").filter(Boolean).join(" ");
    const bk = BOOKS.find(b => b.id === bid);
    setNoteText(notes[noteKey(bid,ch,v)]?.body || "");
    setNoteEd({ bid, ch, v, quote, bk });
    setDrawer(null);
  };

  const saveNote = () => {
    if (!noteEd) return;
    const { bid, ch, v, quote, bk } = noteEd;
    const key = noteKey(bid, ch, v);
    const updated = { ...notes };
    if (noteText.trim()) {
      updated[key] = { key, bookId:bid, ch:+ch, v:+v,
        ref:`${bk?.n} ${ch}:${v}`, quote, body:noteText.trim(), updated:Date.now() };
    } else { delete updated[key]; }
    saveNotes(updated);
    setNoteEd(null);
  };

  // Verse word component
  const Word = ({ tok, bid, ch, vn }) => {
    if (!tok.w) return tok.p ? <span>{tok.p} </span> : null;
    if (!tok.s) return <span style={{ fontFamily:"Georgia,serif" }}>{tok.w}{tok.p || ""} </span>;
    const isH = tok.s.startsWith("H");
    const show = isH ? showH : showG;
    const clr = isH ? C.heb : C.grk;
    return (
      <span style={{ fontFamily:"Georgia,serif" }}>
        <span onClick={() => {
          const entry = STRONGS_DATA[tok.s] || null;
          setDrawer({ word:tok.w, code:tok.s, entry, bid, ch, vn });
        }} style={{
          cursor:"pointer",
          borderBottom: show ? `2px solid ${clr}` : "2px solid transparent",
          color: show ? clr : C.ink,
          borderRadius:2, padding:"0 1px",
          transition:"background 0.1s"
        }}>
          {tok.w}
        </span>
        {showNums && show && (
          <sup onClick={() => setDrawer({ word:tok.w, code:tok.s, entry:STRONGS_DATA[tok.s]||null, bid, ch, vn })}
            style={{ fontFamily:"monospace", fontSize:8, opacity:0.65, cursor:"pointer", color:clr, marginLeft:1 }}>
            {tok.s}
          </sup>
        )}
        {tok.p || ""}{" "}
      </span>
    );
  };

  // Panel slide style
  const panelStyle = (id) => ({
    position:"fixed", inset:0, background:C.parch, zIndex:50,
    display:"flex", flexDirection:"column",
    transform: panel === id ? "translateX(0)" : id === "books" ? "translateX(-100%)" : "translateX(100%)",
    transition:"transform 0.28s cubic-bezier(0.4,0,0.2,1)"
  });

  const navBtnStyle = {
    minWidth:44, height:44, border:"none", background:"transparent",
    color:C.ink4, cursor:"pointer", borderRadius:8,
    display:"flex", alignItems:"center", justifyContent:"center", padding:"0 10px"
  };

  return (
    <div style={{ display:"flex", flexDirection:"column", height:"100vh", background:C.parch, overflow:"hidden", fontFamily:"Georgia,'Times New Roman',serif" }}>

      {/* ── TOP NAV ── */}
      <div style={{ display:"flex", alignItems:"center", background:C.ink, borderBottom:`2px solid ${C.gold}`, padding:"0 6px", height:52, flexShrink:0, gap:2 }}>
        <button style={navBtnStyle} onClick={() => setPanel("books")}>
          <svg width="20" height="20" viewBox="0 0 24 24" stroke="currentColor" fill="none" strokeWidth="1.8" strokeLinecap="round">
            <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
          </svg>
        </button>
        <div style={{ flex:1, textAlign:"center", fontSize:13, letterSpacing:"0.1em", color:C.gold, whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis", textTransform:"uppercase" }}>
          {cBook && cCh ? `${cBook.n.toUpperCase()} · ${cCh}` : "— TAP ☰ TO BEGIN —"}
        </div>
        <button style={navBtnStyle} onClick={() => setTab("search")}>
          <svg width="20" height="20" viewBox="0 0 24 24" stroke="currentColor" fill="none" strokeWidth="1.8" strokeLinecap="round">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
        </button>
      </div>

      {/* ── TOOLBAR (read tab only) ── */}
      {tab === "read" && (
        <div style={{ display:"flex", alignItems:"center", padding:"0 14px", background:C.parch2, height:40, flexShrink:0, borderBottom:`1px solid ${C.parch3}`, gap:8 }}>
          <span style={{ fontSize:11, color:C.heb, marginRight:4 }}>H</span>
          <Toggle checked={showH} onChange={e => setShowH(e.target.checked)} color={C.heb} />
          <span style={{ fontSize:11, color:C.grk, marginLeft:8, marginRight:4 }}>G</span>
          <Toggle checked={showG} onChange={e => setShowG(e.target.checked)} color={C.grk} />
          <span style={{ width:1, height:18, background:C.parch3, margin:"0 8px" }} />
          <span style={{ fontSize:11, color:C.ink3, marginRight:4 }}>Nums</span>
          <Toggle checked={showNums} onChange={e => setShowNums(e.target.checked)} color={C.gold} />
          <div style={{ display:"flex", gap:4, marginLeft:"auto" }}>
            {[["A−",-1],["A+",1]].map(([l,d]) => (
              <button key={l} onClick={() => setFz(f => Math.max(14,Math.min(28,f+d)))}
                style={{ width:30, height:28, border:`1.5px solid ${C.parch3}`, background:C.parch, color:C.ink3, borderRadius:6, cursor:"pointer", fontSize:11 }}>{l}</button>
            ))}
          </div>
        </div>
      )}

      {/* ── MAIN CONTENT ── */}
      <div style={{ flex:1, overflow:"hidden", position:"relative" }}>

        {/* READ */}
        {tab === "read" && (
          <div style={{ position:"absolute", inset:0, overflowY:"auto", background:C.parch }}>
            {!verses || verses === "loading" ? (
              <div style={{ textAlign:"center", padding:"52px 24px", color:C.ink3 }}>
                <div style={{ fontSize:42, marginBottom:14, opacity:0.35 }}>✝</div>
                <div style={{ fontSize:16, color:C.ink2, marginBottom:12, fontWeight:600 }}>Welcome to Strongs Bible</div>
                <div style={{ fontSize:15, lineHeight:1.75 }}>
                  Tap <strong>☰</strong> to choose a book.<br/><br/>
                  <span style={{ color:C.heb, fontWeight:600 }}>Amber underline</span> = Hebrew (OT)<br/>
                  <span style={{ color:C.grk, fontWeight:600 }}>Blue underline</span> = Greek (NT)<br/><br/>
                  Tap any coloured word → Strong's definition.<br/>
                  <span style={{ color:C.teal, fontWeight:600 }}>Tap a verse number</span> → add a study note.<br/><br/>
                  <span style={{ fontSize:13, color:C.ink4 }}>
                    {strongsLoaded 
                      ? "✓ Full Strong's dictionary loaded (14,298 entries)"
                      : strongsError 
                        ? "⚠ Could not load Strong's — check your internet connection"
                        : "Loading Strong's dictionary…"}
                  </span>
                </div>
              </div>
            ) : (
              <div style={{ padding:"20px 0 60px" }}>
                {/* Chapter header */}
                <div style={{ textAlign:"center", margin:"0 16px 24px", paddingBottom:18, borderBottom:`2px solid ${C.parch3}`, position:"relative" }}>
                  <div style={{ fontSize:10, color:C.crimson, letterSpacing:"0.18em", textTransform:"uppercase", marginBottom:6 }}>{cBook.n}</div>
                  <div style={{ fontSize:38, color:C.ink, lineHeight:1, fontWeight:600 }}>{cCh}</div>
                  <div style={{ display:"flex", justifyContent:"center", gap:10, marginTop:12 }}>
                    {cCh > 1 && (
                      <button onClick={() => loadCh(verses.bid, cCh-1)}
                        style={{ fontSize:11, color:C.ink3, background:C.parch2, border:`1.5px solid ${C.parch3}`, borderRadius:6, padding:"6px 14px", cursor:"pointer" }}>
                        ‹ {cCh-1}
                      </button>
                    )}
                    {cCh < cBook.ch && (
                      <button onClick={() => loadCh(verses.bid, cCh+1)}
                        style={{ fontSize:11, color:C.ink3, background:C.parch2, border:`1.5px solid ${C.parch3}`, borderRadius:6, padding:"6px 14px", cursor:"pointer" }}>
                        {cCh+1} ›
                      </button>
                    )}
                  </div>
                  <div style={{ position:"absolute", bottom:-2, left:"50%", transform:"translateX(-50%)", width:40, height:2, background:C.gold }} />
                </div>

                {/* Verses */}
                {Object.keys(verses.data).map(Number).sort((a,b)=>a-b).map(vn => (
                  <div key={vn} id={`vrow-${vn}`} style={{ display:"flex", marginBottom:1 }}>
                    {/* Verse number — full-height tap target */}
                    <div onClick={() => openNote(verses.bid, verses.ch, vn)}
                      style={{
                        minWidth:52, padding:"14px 8px 14px 14px",
                        fontSize:11, fontWeight:600, flexShrink:0,
                        textAlign:"right", cursor:"pointer", userSelect:"none",
                        display:"flex", alignItems:"flex-start", justifyContent:"flex-end", paddingTop:16,
                        borderLeft: hasNote(verses.bid, verses.ch, vn) ? `3px solid ${C.teal}` : "3px solid transparent",
                        color: hasNote(verses.bid, verses.ch, vn) ? C.teal : C.crimson,
                        transition:"all 0.12s"
                      }}>
                      {vn}
                    </div>
                    {/* Verse text */}
                    <div style={{ fontSize:fz, lineHeight:1.82, color:C.ink, flex:1, padding:"10px 18px 10px 6px", wordBreak:"break-word" }}>
                      {verses.data[String(vn)].map((tok, i) => (
                        <Word key={i} tok={tok} bid={verses.bid} ch={verses.ch} vn={vn} />
                      ))}
                    </div>
                  </div>
                ))}
              </div>
            )}
          </div>
        )}

        {/* NOTES */}
        {tab === "notes" && (
          <div style={{ position:"absolute", inset:0, overflowY:"auto", background:C.parch }}>
            <div style={{ display:"flex", alignItems:"center", gap:8, padding:"12px 14px", background:C.parch2, borderBottom:`1px solid ${C.parch3}` }}>
              <span style={{ fontSize:14, color:C.ink2, flex:1, letterSpacing:"0.07em" }}>Study Notes</span>
              <button onClick={() => {
                const sorted = Object.values(notes).sort((a,b) => {
                  const bi = id => BOOKS.findIndex(b=>b.id===id);
                  return bi(a.bookId)-bi(b.bookId)||a.ch-b.ch||a.v-b.v;
                });
                let o = "STRONGS BIBLE — STUDY NOTES\nAmerican Standard Version\n\n";
                let lb = null;
                sorted.forEach(n => {
                  if (n.bookId !== lb) { o += `\n── ${(BOOKS.find(b=>b.id===n.bookId)?.n||n.bookId).toUpperCase()} ──\n\n`; lb = n.bookId; }
                  o += `${n.ref}\n"${n.quote}"\n\n${n.body}\n\n${"-".repeat(26)}\n\n`;
                });
                const a = document.createElement("a");
                a.href = URL.createObjectURL(new Blob([o], { type:"text/plain" }));
                a.download = `notes-${new Date().toISOString().slice(0,10)}.txt`;
                a.click(); URL.revokeObjectURL(a.href);
              }} style={{ padding:"7px 12px", border:`1.5px solid ${C.parch3}`, borderRadius:8, background:C.parch, color:C.ink3, fontSize:12, cursor:"pointer" }}>
                Export .txt
              </button>
            </div>
            {Object.keys(notes).length === 0 ? (
              <div style={{ padding:"60px 24px", textAlign:"center", color:C.ink3, fontSize:15, lineHeight:1.8, fontStyle:"italic" }}>
                No notes yet.<br/>Tap any verse number while reading<br/>to add a study note.
              </div>
            ) : (
              <div style={{ padding:"12px 0" }}>
                {Object.values(notes).sort((a,b)=>b.updated-a.updated).map(n => (
                  <div key={n.key} style={{ margin:"0 14px 12px", background:"#fff", border:`1px solid ${C.parch3}`, borderRadius:10, overflow:"hidden", boxShadow:"0 2px 8px rgba(0,0,0,0.06)" }}>
                    <div style={{ display:"flex", alignItems:"center", gap:8, padding:"10px 14px", background:C.ink, cursor:"pointer" }}
                      onClick={() => { loadCh(n.bookId, n.ch); setTab("read"); setTimeout(() => document.getElementById(`vrow-${n.v}`)?.scrollIntoView({behavior:"smooth",block:"center"}), 600); }}>
                      <span style={{ fontSize:12, color:C.gold, flex:1, letterSpacing:"0.06em" }}>📌 {n.ref}</span>
                      <span style={{ fontSize:11, color:C.ink4 }}>{new Date(n.updated).toLocaleDateString(undefined,{month:"short",day:"numeric",year:"numeric"})}</span>
                      <button onClick={e => { e.stopPropagation(); const u={...notes}; delete u[n.key]; saveNotes(u); }}
                        style={{ width:28, height:28, border:"none", background:"transparent", color:"rgba(255,255,255,0.3)", fontSize:18, cursor:"pointer" }}>×</button>
                    </div>
                    {n.quote && <div style={{ padding:"8px 14px", fontSize:13, color:C.ink3, fontStyle:"italic", borderBottom:`1px solid ${C.parch3}`, lineHeight:1.55, background:C.parch }}>"{n.quote}"</div>}
                    <div style={{ padding:"12px 14px", fontSize:16, lineHeight:1.7, color:C.ink2, whiteSpace:"pre-wrap", cursor:"pointer" }}
                      onClick={() => openNote(n.bookId, n.ch, n.v)}>{n.body}</div>
                  </div>
                ))}
              </div>
            )}
          </div>
        )}

        {/* SEARCH */}
        {tab === "search" && (
          <div style={{ position:"absolute", inset:0, overflowY:"auto", background:C.parch }}>
            <div style={{ padding:"10px 14px", background:C.parch2, borderBottom:`1px solid ${C.parch3}` }}>
              <input value={searchQ} onChange={e => setSearchQ(e.target.value)} placeholder="Search verses…"
                autoFocus
                style={{ width:"100%", padding:"10px 14px", background:C.parch, border:`1.5px solid ${C.parch3}`, borderRadius:10, color:C.ink, fontFamily:"Georgia,serif", fontSize:17, outline:"none", boxSizing:"border-box" }} />
            </div>
            {hits.length === 0 && searchQ.length < 2 && (
              <div style={{ padding:"40px 24px", textAlign:"center", color:C.ink3, fontSize:15, fontStyle:"italic" }}>Type to search loaded books</div>
            )}
            {hits.length === 0 && searchQ.length >= 2 && (
              <div style={{ padding:"40px 24px", textAlign:"center", color:C.ink3, fontSize:15 }}>No results found</div>
            )}
            {hits.map((h,i) => (
              <div key={i} onClick={() => { loadCh(h.bid, h.ch); setTimeout(() => document.getElementById(`vrow-${h.v}`)?.scrollIntoView({behavior:"smooth",block:"center"}), 600); }}
                style={{ padding:"14px 16px", borderBottom:`1px solid ${C.parch3}`, cursor:"pointer" }}>
                <div style={{ fontSize:10, color:C.crimson, letterSpacing:"0.09em", textTransform:"uppercase", marginBottom:4 }}>{h.bk?.n} {h.ch}:{h.v}</div>
                <div style={{ fontSize:15, lineHeight:1.55, color:C.ink2 }}>{h.txt.slice(0,140)}</div>
              </div>
            ))}
          </div>
        )}
      </div>

      {/* ── TAB BAR ── */}
      <div style={{ display:"flex", background:C.ink, borderTop:`2px solid ${C.gold}`, flexShrink:0 }}>
        {[
          ["read","Read", <svg key="r" width="20" height="20" viewBox="0 0 24 24" stroke="currentColor" fill="none" strokeWidth="1.7" strokeLinecap="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>],
          ["notes","Notes", <svg key="n" width="20" height="20" viewBox="0 0 24 24" stroke="currentColor" fill="none" strokeWidth="1.7" strokeLinecap="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>],
          ["search","Search", <svg key="s" width="20" height="20" viewBox="0 0 24 24" stroke="currentColor" fill="none" strokeWidth="1.7" strokeLinecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>]
        ].map(([id, lbl, icon]) => (
          <button key={id} onClick={() => setTab(id)} style={{
            flex:1, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center",
            padding:"10px 0 7px", border:"none", background:"transparent",
            color: tab === id ? C.gold : "rgba(255,255,255,0.3)",
            cursor:"pointer", fontSize:9, letterSpacing:"0.09em", textTransform:"uppercase",
            minHeight:52, gap:4, position:"relative"
          }}>
            {icon}{lbl}
            {id === "notes" && Object.keys(notes).length > 0 && (
              <span style={{ width:5, height:5, borderRadius:"50%", background:C.teal, position:"absolute", top:8, right:"calc(50% - 16px)" }} />
            )}
          </button>
        ))}
      </div>

      {/* ── BOOK PANEL ── */}
      <div style={panelStyle("books")}>
        <div style={{ display:"flex", alignItems:"center", padding:14, background:C.ink, borderBottom:`2px solid ${C.gold}` }}>
          <span style={{ fontSize:15, color:C.gold, flex:1, letterSpacing:"0.08em" }}>Books of the Bible</span>
          <button onClick={() => setPanel(null)} style={{ width:36, height:36, border:"none", background:"transparent", color:C.ink4, fontSize:22, cursor:"pointer" }}>✕</button>
        </div>
        <input value={bookQ} onChange={e => setBookQ(e.target.value)} placeholder="Search books…"
          style={{ margin:"12px 14px", padding:"10px 14px", background:C.parch2, border:`1.5px solid ${C.parch3}`, borderRadius:10, color:C.ink, fontFamily:"Georgia,serif", fontSize:16, outline:"none", width:"calc(100% - 28px)", boxSizing:"border-box" }} />
        <div style={{ flex:1, overflowY:"auto", paddingBottom:20 }}>
          {(() => {
            let lastT = null;
            return BOOKS.filter(b => !bookQ || b.n.toLowerCase().includes(bookQ.toLowerCase())).flatMap(b => {
              const items = [];
              if (b.t !== lastT) {
                lastT = b.t;
                items.push(<div key={"h"+b.t} style={{ padding:"8px 14px 4px", fontSize:9, letterSpacing:"0.18em", textTransform:"uppercase", color:C.crimson, fontWeight:600 }}>{b.t==="OT"?"Old Testament":"New Testament"}</div>);
              }
              const hasData = !!VERSES_DATA[b.id];
              items.push(
                <div key={b.id} onClick={() => { setCBook(b); setPanel("chapters"); }}
                  style={{ display:"flex", alignItems:"center", padding:"13px 16px", cursor:"pointer", borderBottom:`1px solid ${C.parch3}`, gap:12, minHeight:52, background: cBook?.id===b.id ? C.parch2 : "transparent" }}>
                  <span style={{ width:26, fontSize:11, color:C.ink4, textAlign:"right" }}>{BOOKS.indexOf(b)+1}</span>
                  <span style={{ fontSize:18, color: hasData ? C.ink2 : C.ink4, flex:1, fontWeight:500 }}>{b.n}</span>
                  <span style={{ fontSize:12, color: hasData ? C.crimson : C.ink4 }}>{hasData ? "★ " : ""}{b.ch}ch</span>
                </div>
              );
              return items;
            });
          })()}
        </div>
      </div>

      {/* ── CHAPTER PANEL ── */}
      <div style={panelStyle("chapters")}>
        <div style={{ display:"flex", alignItems:"center", padding:14, background:C.ink, borderBottom:`2px solid ${C.gold}` }}>
          <button onClick={() => setPanel("books")} style={{ width:44, height:44, border:"none", background:"transparent", color:C.ink4, fontSize:24, cursor:"pointer", display:"flex", alignItems:"center" }}>‹</button>
          <span style={{ fontSize:15, color:C.gold, flex:1, letterSpacing:"0.08em" }}>{cBook?.n}</span>
          <button onClick={() => setPanel(null)} style={{ width:36, height:36, border:"none", background:"transparent", color:C.ink4, fontSize:22, cursor:"pointer" }}>✕</button>
        </div>
        <div style={{ display:"grid", gridTemplateColumns:"repeat(6,1fr)", gap:8, padding:14, overflowY:"auto", flex:1 }}>
          {cBook && Array.from({length:cBook.ch},(_,i)=>i+1).map(c => {
            const hasData = !!VERSES_DATA[cBook.id]?.[String(c)];
            return (
              <button key={c} onClick={() => loadCh(cBook.id, c)} style={{
                aspectRatio:"1", border:`1.5px solid ${cCh===c ? C.crimson : hasData ? C.gold : C.parch3}`,
                background: cCh===c ? C.crimson : C.parch2,
                borderRadius:10, color: cCh===c ? "#fff" : hasData ? C.gold : C.ink2,
                fontSize:15, cursor:"pointer", fontFamily:"Georgia,serif", minHeight:44
              }}>{c}</button>
            );
          })}
        </div>
      </div>

      {/* ── STRONGS DRAWER OVERLAY ── */}
      <div onClick={() => setDrawer(null)} style={{
        position:"fixed", inset:0, background:"rgba(20,10,0,0.55)", zIndex:80,
        opacity: drawer ? 1 : 0, pointerEvents: drawer ? "all" : "none", transition:"opacity 0.2s"
      }} />

      {/* ── STRONGS DRAWER ── */}
      <div style={{
        position:"fixed", bottom:0, left:0, right:0, background:C.parch,
        borderRadius:"20px 20px 0 0", borderTop:`2px solid ${C.gold}`,
        zIndex:81, maxHeight:"72vh",
        transform: drawer ? "translateY(0)" : "translateY(100%)",
        transition:"transform 0.28s cubic-bezier(0.4,0,0.2,1)",
        display:"flex", flexDirection:"column",
        boxShadow:"0 -8px 40px rgba(0,0,0,0.25)"
      }}>
        <div style={{ width:40, height:4, background:C.parch3, borderRadius:2, margin:"12px auto 0", flexShrink:0 }} />
        {drawer && (
          <div style={{ flex:1, overflowY:"auto", padding:"14px 20px 24px" }}>
            {/* Tag */}
            <span style={{
              display:"inline-block", fontFamily:"monospace", fontSize:11, padding:"3px 10px",
              borderRadius:6, marginBottom:10, fontWeight:500,
              background: drawer.code.startsWith("H") ? "rgba(155,68,0,0.12)" : "rgba(26,74,122,0.1)",
              color: drawer.code.startsWith("H") ? C.heb : C.grk,
              border: `1px solid ${drawer.code.startsWith("H") ? "rgba(155,68,0,0.2)" : "rgba(26,74,122,0.2)"}`
            }}>
              {drawer.code} · {drawer.code.startsWith("H") ? "Hebrew" : "Greek"}
            </span>
            <div style={{ fontFamily:"Georgia,serif", fontSize:26, color:C.ink, marginBottom:4, fontStyle:"italic", fontWeight:500 }}>
              "{drawer.word}"
            </div>
            {drawer.entry ? (<>
              {drawer.entry.lemma && <div style={{ fontSize:30, marginBottom:4, lineHeight:1.15, color:C.gold }}>{drawer.entry.lemma}</div>}
              {drawer.entry.xlit && <div style={{ fontFamily:"monospace", fontSize:12, color:C.ink3, marginBottom:2 }}>{drawer.entry.xlit}</div>}
              {drawer.entry.pron && <div style={{ fontSize:13, color:C.teal, marginBottom:8, fontStyle:"italic" }}>/{drawer.entry.pron}/</div>}
              {drawer.entry.pos && (
                <div style={{ display:"inline-block", fontSize:10, letterSpacing:"0.09em", textTransform:"uppercase", background:C.parch2, color:C.ink3, padding:"3px 9px", borderRadius:4, marginBottom:12, border:`1px solid ${C.parch3}` }}>
                  {drawer.entry.pos}
                </div>
              )}
              <div style={{ height:1, background:C.parch3, margin:"10px 0" }} />
              <div style={{ fontSize:9, letterSpacing:"0.15em", textTransform:"uppercase", color:C.crimson, marginBottom:5, fontWeight:600 }}>Definition</div>
              <div style={{ fontSize:17, lineHeight:1.65, color:C.ink2 }}>{drawer.entry.definition}</div>
              {drawer.entry.kjv && (
                <div style={{ fontSize:13, color:C.ink3, marginTop:8, fontStyle:"italic", paddingTop:8, borderTop:`1px solid ${C.parch3}` }}>
                  KJV: {drawer.entry.kjv}
                </div>
              )}
            </>) : (
              <div style={{ fontSize:14, color:C.ink3, padding:"14px 0" }}>
                {!strongsLoaded 
                  ? "Loading Strong's dictionary…" 
                  : `Definition for ${drawer.code} not found.`}
              </div>
            )}
            {/* Add note button */}
            <div onClick={() => openNote(drawer.bid, drawer.ch, drawer.vn)}
              style={{ display:"flex", alignItems:"center", gap:8, marginTop:16, padding:"12px 14px", background:C.parch2, border:`1.5px solid ${C.parch3}`, borderRadius:10, cursor:"pointer", color:C.ink3, fontSize:14 }}>
              ✎ {hasNote(drawer.bid, drawer.ch, drawer.vn) ? "Edit" : "Add"} note — {BOOKS.find(b=>b.id===drawer.bid)?.n} {drawer.ch}:{drawer.vn}
            </div>
          </div>
        )}
      </div>

      {/* ── NOTE EDITOR ── */}
      <div style={{
        position:"fixed", inset:0, background:C.parch, zIndex:60,
        display:"flex", flexDirection:"column",
        transform: noteEd ? "translateY(0)" : "translateY(100%)",
        transition:"transform 0.28s cubic-bezier(0.4,0,0.2,1)"
      }}>
        <div style={{ display:"flex", alignItems:"center", gap:10, padding:13, background:C.ink, borderBottom:`2px solid ${C.gold}`, flexShrink:0 }}>
          <button onClick={() => setNoteEd(null)} style={{ width:44, height:44, border:"none", background:"transparent", color:C.ink4, fontSize:20, cursor:"pointer" }}>✕</button>
          <span style={{ fontSize:14, color:C.gold, flex:1, letterSpacing:"0.08em" }}>
            {noteEd && `${noteEd.bk?.n} ${noteEd.ch}:${noteEd.v}`}
          </span>
          <button onClick={saveNote} style={{ padding:"8px 20px", border:"none", background:C.crimson, color:"#fff", borderRadius:8, fontSize:13, cursor:"pointer", letterSpacing:"0.06em" }}>
            Save
          </button>
        </div>
        {noteEd?.quote && (
          <div style={{ padding:"10px 16px", background:C.parch2, borderBottom:`1px solid ${C.parch3}`, fontSize:14, color:C.ink3, fontStyle:"italic", lineHeight:1.55, flexShrink:0 }}>
            "{noteEd.quote}"
          </div>
        )}
        <textarea value={noteText} onChange={e => setNoteText(e.target.value)}
          placeholder="Study notes, cross-references, observations, prayer…"
          autoFocus={!!noteEd}
          style={{ flex:1, padding:16, background:C.parch, border:"none", outline:"none", color:C.ink, fontFamily:"Georgia,serif", fontSize:18, lineHeight:1.75, resize:"none" }} />
      </div>

    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(StrongsBible));
</script>
</body>
</html>
